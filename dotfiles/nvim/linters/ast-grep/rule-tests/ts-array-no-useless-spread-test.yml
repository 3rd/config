id: ts-array-no-useless-spread
valid:
  - const a = [...b];
  - const a = [...b].some(Boolean);
  - const a = [...iterable].map((item) => item);
  - const a = [...b].copyWithin();
  - const a = [...b].fill()
  - const a = [...b].pop()
  - const a = [...b].push()
  - const a = [...b].reverse()
  - const a = [...b].shift()
  - const a = [...b].sort();
  - const a = [...b].splice();
  - const a = [...b].unshift();
  - const a = [..."abc"].map((letter) => letter.toUpperCase());
  - |
    const declaredNames = new Set<string>();
    const knownNames = new Set<string>();
    if (![...declaredNames].some((name) => knownNames.has(name))) return new Set<string>();
  - |
    const entries = new Map<string, string>();
    const keys = [...entries].map(([key]) => key);
  - |
    function* values() {
      yield 1;
    }
    const a = [...values()].map(Boolean);
  - const a = [...[, 1]].map((item) => item);
  - const a = [...[1,, 2]].map((item) => item);
  - |
    const items: string[] = [];
    function collect(items: Set<string>) {
      return [...items].some(Boolean);
    }
invalid:
  - const a = [...[1, 2]].at()
  - const a = [...[1, 2]].concat()
  - const a = [...[1, 2]].entries()
  - const a = [...[1, 2]].every()
  - const a = [...[1, 2]].filter()
  - const a = [...[1, 2]].find()
  - const a = [...[1, 2]].findIndex()
  - const a = [...[1, 2]].findLast()
  - const a = [...[1, 2]].findLastIndex()
  - const a = [...[1, 2]].flat()
  - const a = [...[1, 2]].flatMap()
  - const a = [...[1, 2]].forEach()
  - const a = [...[1, 2]].includes()
  - const a = [...[1, 2]].indexOf()
  - const a = [...[1, 2]].join("\n")
  - const a = [...[1, 2]].keys()
  - const a = [...[1, 2]].map(item => item + 1)
  - const a = [...[1, 2]].reduce()
  - const a = [...[1, 2]].reduceRight()
  - const a = [...[1, 2]].slice()
  - const a = [...[1, 2]].some()
  - const a = [...[1, 2]].toLocaleString()
  - const a = [...[1, 2]].toReversed()
  - const a = [...[1, 2]].toSorted()
  - const a = [...[1, 2]].toSpliced()
  - const a = [...[1, 2]].toString()
  - const a = [...[1, 2]].values()
  - const a = [...[1, 2]].with()
  - const a = [...Array.from(values)].some(Boolean)
  - |
    const items = [1, 2];
    const a = [...items].filter(Boolean);
  - |
    let items = Array.from(values);
    const a = [...items].map((item) => item);
  - |
    const items: string[] = getItems();
    const a = [...items].some(Boolean);
  - |
    let items: Array<string> = getItems();
    const a = [...items].join(",");
