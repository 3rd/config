id: ts-arrow-no-multiline-expression-body-async
snapshots:
  ? |
    Promise.resolve(value).then(async () => doThis ?
      blaThis : blaThis &&
      2 + etc)
  : fixed: |
      Promise.resolve(value).then(async () => {
        return doThis ?
          blaThis : blaThis &&
          2 + etc
      })
