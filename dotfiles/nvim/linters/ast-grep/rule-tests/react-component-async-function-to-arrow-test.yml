id: react-component-async-function-to-arrow
valid:
  - |
      function ExampleBad(props: ExampleBadProps) {
        return <div />
      }
  - |
      async function helper() {
        return <div />
      }
  - |
      async function ExampleBad<T>(props: ExampleBadProps<T>) {
        return <div />
      }
  - |
      export default async function ExampleBad(props: ExampleBadProps) {
        return <div />
      }
  - |
      function helperWrapper() {
        async function Child() {
          return <div />
        }

        return <Child />
      }
invalid:
  - |
      async function ExampleBad(props: ExampleBadProps) {
        return <div />
      }
  - |
      export async function ExampleBad(props: ExampleBadProps) {
        return <div />
      }
  - |
      async function ExampleBad(
        props: ExampleBadProps,
      ): Promise<React.JSX.Element> {
        // keep comment
        return <div />
      }
  - |
      async function ExampleBad() {
        const value = useThing()
        return null
      }
  - |
      async function ExampleBad(props: ExampleBadProps) {
        return React.createElement("div", null, props.label)
      }
