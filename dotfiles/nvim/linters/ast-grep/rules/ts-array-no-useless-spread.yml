id: ts-array-no-useless-spread
message: Useless array spread before non-mutating method
severity: error
language: tsx
utils:
  is-local-array-declaration:
    any:
      - all:
          - any:
              - pattern: "const $TARGET = [$$$]"
              - pattern: "let $TARGET = [$$$]"
          - not:
              regex: "=[[:space:]]*.[[:space:]]*,|,[[:space:]]*,"
      - pattern: "const $TARGET = Array.from($$$)"
      - pattern: "let $TARGET = Array.from($$$)"
      - pattern: "const $TARGET: $TYPE[] = $$$"
      - pattern: "let $TARGET: $TYPE[] = $$$"
      - pattern: "const $TARGET: Array<$TYPE> = $$$"
      - pattern: "let $TARGET: Array<$TYPE> = $$$"
rule:
  any:
    - all:
        - pattern: "[...[$$$ELEMENTS]].$METHOD($$$)"
        - not:
            regex: "^.....[[:space:]]*,|,[[:space:]]*,"
    - pattern: "[...Array.from($$$SOURCE)].$METHOD($$$)"
    - all:
        - pattern: "[...$TARGET].$METHOD($$$)"
        - inside:
            all:
              - any:
                  - kind: program
                  - kind: statement_block
              - has:
                  matches: is-local-array-declaration
            stopBy:
              any:
                - kind: program
                - kind: statement_block
constraints:
  METHOD:
    regex: at|concat|entries|every|filter|find|findIndex|findLast|findLastIndex|flat|flatMap|forEach|includes|indexOf|join|keys|lastIndexOf|map|reduce|reduceRight|slice|some|toLocaleString|toReversed|toSorted|toSpliced|toString|values|with
